name: cycle-mechanisms-daily

# Daily compute of the 6 v11 cycle mechanisms (Valuation, Credit, Funding,
# Growth, Liquidity & Policy, Positioning & Breadth). Reads
# public/indicator_history.json, writes public/cycle_board_snapshot.json.
#
# Schedule: 22:30 UTC weekdays (after EOD market data lands, before next-day
# Macro Overview render). Manual dispatch also enabled.

on:
  schedule:
    - cron: "30 22 * * 1-5"
  workflow_dispatch:

concurrency:
  group: cycle-mechanisms-daily
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          # Pure-stdlib script — no external deps required at runtime.
          # If later we add pandas/numpy, add them here.

      - name: Run compute
        run: python scripts/compute_v11_mechanisms.py

      - name: Verify snapshot was written
        run: |
          test -s public/cycle_board_snapshot.json
          python -c "import json; d=json.load(open('public/cycle_board_snapshot.json')); assert d['mechanisms'], 'no mechanisms'; print('OK', d['page_stance'], len(d['mechanisms']), 'mechanisms')"

      - name: Commit snapshot if changed
        run: |
          git config user.name "macrotilt-bot"
          git config user.email "macrotilt-bot@users.noreply.github.com"
          git add public/cycle_board_snapshot.json
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "chore(data): refresh cycle_board_snapshot — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
