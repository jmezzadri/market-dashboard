name: PAPER-PORTFOLIO-CLOSE-DAILY

# MacroTilt paper-portfolio AUTHORITATIVE end-of-day snapshot.
#
# This is the daily backtest record. After the 4:00 PM ET close, it snapshots:
#   1. mirror_fills      — pull any fills since the last successful run.
#   2. mirror_positions  — write today's per-name positions at settled close
#                          prices, incl. day P&L, total P&L, holding period.
#   3. write_nav_daily   — write today's NAV row incl. SPY + AGG closes,
#                          realized/unrealized P&L per sleeve, position counts,
#                          and trailing portfolio beta.
#
# Pipeline name (Data Steward convention): paper-portfolio-close-daily
#
# Schedule:
#   * 21:10 UTC. We deliberately pick a single UTC time that is ALWAYS after
#     the 16:00 ET close so closing prices have settled:
#       - EST (winter, UTC-5): 21:10 UTC = 16:10 ET  (10 min after close)
#       - EDT (summer, UTC-4): 21:10 UTC = 17:10 ET  (70 min after close)
#     Both are safely post-close. The morning OPEN job still runs at 09:45 ET
#     for intraday freshness; this CLOSE job overwrites the same dated row with
#     settled prices and is the canonical daily history point for backtesting.
#   * Weekdays only.
#
# Required GitHub secrets: same as the OPEN/EOD workflows.

on:
  schedule:
    - cron: '10 21 * * 1-5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (compute, no DB writes)'
        required: false
        default: 'false'

concurrency:
  group: paper-portfolio-close
  cancel-in-progress: false

jobs:
  close:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out market-dashboard
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install requests pandas pyarrow numpy scipy

      - name: Run close phase (settled-price snapshot — fills + positions + NAV)
        # Read-only against Alpaca, write-only to Supabase snapshot tables.
        # No live-submission risk; PAPER_LIVE_TRADING_ENABLED only gates the
        # snapshot WRITE path (same convention as the OPEN job).
        env:
          SUPABASE_ACCESS_TOKEN:        ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_URL:                 ${{ secrets.SUPABASE_URL }}
          ALPACA_PAPER_KEY_ID:          ${{ secrets.ALPACA_PAPER_KEY_ID }}
          ALPACA_PAPER_SECRET:          ${{ secrets.ALPACA_PAPER_SECRET }}
          ALPACA_PAPER_BASE_URL:        ${{ secrets.ALPACA_PAPER_BASE_URL }}
          PAPER_LIVE_TRADING_ENABLED:   "true"
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python -m paper_portfolio.runner --phase close --dry-run
          else
            python -m paper_portfolio.runner --phase close
          fi
