name: sector-perf-daily

# Daily compute of per-sector 1M / 3M / TTM returns + TTM realized vol.
# Source: Supabase public.prices_eod (Massive/Polygon EOD feed + 2003+
# yfinance bootstrap). Writes public/sector_perf.json. Asset Tilt page
# reads this for the performance + volatility columns in the equity
# sectors table.
#
# Schedule: 22:50 UTC weekdays — after EOD close, 5 min after v10
# allocator runs so a freshly-deployed page picks up both at once.
#
# History (bug #1186, 2026-05-12): Yahoo started rate-limiting GitHub
# Actions IPs and every daily run wrote nulls. Swapped to the Supabase
# feed per the v9 pattern (LESSONS rule 2026-04-30, Polygon Basic cap).

on:
  schedule:
    - cron: "50 22 * * 1-5"
  workflow_dispatch:

concurrency:
  group: sector-perf-daily
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run sector perf script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/compute_sector_perf.py

      - name: Commit if changed
        run: |
          git config user.name "macrotilt-bot"
          git config user.email "macrotilt-bot@users.noreply.github.com"
          git add public/sector_perf.json
          if git diff --cached --quiet; then
            echo "No changes — skipping."
          else
            git commit -m "sector-perf-daily: refresh sector_perf.json [skip ci]"
            git push
          fi
