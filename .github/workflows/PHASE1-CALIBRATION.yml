name: PHASE1-CALIBRATION

# Runs the Scenario Analysis Phase 1 calibration orchestrator
# (scripts/calibrate_scenario_panel.py) and commits the 7 JSON artifacts to
# public/scenario_calibration/. Also runs the CCAR→v9 translation self-tests.
#
# Triggers:
#   - Manual (workflow_dispatch) — for ad-hoc refreshes during Sprint 2 build.
#   - Quarterly cron — refreshes calibration as new CCAR data lands at the Fed.
#
# Required GitHub secret: FRED_API_KEY (already in the repo's secrets per
# V9-ALLOCATION-WEEKLY).

on:
  workflow_dispatch:
  schedule:
    # Quarterly: 12:00 UTC on the 15th of Jan/Apr/Jul/Oct, after CCAR-relevant
    # FRED series typically refresh.
    - cron: '0 12 15 1,4,7,10 *'

concurrency:
  group: phase1-calibration
  cancel-in-progress: false

jobs:
  calibrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scipy scikit-learn requests yfinance

      - name: Configure git
        run: |
          git config user.name  "Market Dashboard Bot"
          git config user.email "bot@github-actions"

      - name: Run translation self-tests (gates the pipeline)
        run: python asset_allocation/ccar_translation.py

      - name: Run Phase 1 calibration orchestrator
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/calibrate_scenario_panel.py

      - name: Commit + push calibration artifacts
        run: |
          git add public/scenario_calibration/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No calibration changes — skipping commit."
            exit 0
          fi
          AS_OF=$(date -u +%Y-%m-%d)
          git commit -m "PHASE1-CALIBRATION refresh — ${AS_OF} [skip ci]

          Regenerated by .github/workflows/PHASE1-CALIBRATION.yml"
          git push || echo "Push failed (non-fatal); next manual run can retry."

      - name: Upload calibration artifacts
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: phase1-calibration-${{ github.run_id }}
          path: public/scenario_calibration/
          retention-days: 90
          if-no-files-found: warn
