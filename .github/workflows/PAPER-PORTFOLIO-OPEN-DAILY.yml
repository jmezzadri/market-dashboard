name: PAPER-PORTFOLIO-OPEN-DAILY

# MacroTilt paper-portfolio post-open mirror phase.
#   1. mirror_fills      — pull Alpaca fills since the last successful run.
#   2. mirror_positions  — overwrite today's paper_positions snapshot.
#   3. write_nav_daily   — write today's row to paper_nav_daily.
#
# Pipeline name (Data Steward convention): paper-portfolio-open-daily
#
# Schedule:
#   * 13:45 UTC = 9:45 AM EDT (UTC-4) / 8:45 AM EST (UTC-5) — 15 min after
#     the opening auction settles. MOO fills are reported by Alpaca within
#     a few seconds of the auction; 15 min is a safe buffer for slow tickers.
#   * Weekdays only.
#
# Required GitHub secrets: same as the EOD workflow.

on:
  schedule:
    - cron: '45 13 * * 1-5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (compute, no DB writes)'
        required: false
        default: 'false'

concurrency:
  group: paper-portfolio-open
  cancel-in-progress: false

jobs:
  open:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out market-dashboard
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install requests pandas pyarrow numpy scipy

      - name: Run open phase (fills + positions + NAV mirror)
        # Mirror phase has no live-submission risk — it only READS from
        # Alpaca and WRITES to Supabase snapshot tables. The live-trading
        # kill-switch governs the EOD phase; mirror always runs as-is.
        env:
          SUPABASE_ACCESS_TOKEN:        ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_URL:                 ${{ secrets.SUPABASE_URL }}
          ALPACA_PAPER_KEY_ID:          ${{ secrets.ALPACA_PAPER_KEY_ID }}
          ALPACA_PAPER_SECRET:          ${{ secrets.ALPACA_PAPER_SECRET }}
          ALPACA_PAPER_BASE_URL:        ${{ secrets.ALPACA_PAPER_BASE_URL }}
          PAPER_LIVE_TRADING_ENABLED:   "true"
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python -m paper_portfolio.runner --phase open --dry-run
          else
            python -m paper_portfolio.runner --phase open
          fi
