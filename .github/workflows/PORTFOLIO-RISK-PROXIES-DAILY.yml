name: PORTFOLIO-RISK-PROXIES-DAILY

# Pipeline: market-portfolio_risk_proxies-daily
#
# Regenerates public/risk_proxies.json — ~3 years of aligned DAILY RETURNS for
# the liquid proxy instruments behind the Portfolio "Risk metrics (trailing)"
# card, plus the current risk-free rate (13-week T-bill). The Portfolio page
# combines these market series with the user's LIVE weights (client-side) to
# compute volatility, Sharpe, Sortino, max drawdown, value-at-risk and factor
# betas. No user data is published here — only market series.
#
# Why nightly after the close: the stats are end-of-day, so the feed only needs
# to advance once daily once Yahoo's EOD prints have settled.
#
# No secrets required (yfinance is keyless).

on:
  schedule:
    - cron: '0 23 * * 1-5'   # 23:00 UTC ≈ 6-7pm ET, after the US close
  workflow_dispatch:

concurrency:
  group: portfolio-risk-proxies-daily
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Check out market-dashboard
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name  "Market Dashboard Bot"
          git config user.email "bot@github-actions"

      - name: Regenerate risk_proxies.json
        run: python compute_risk_proxies.py public/risk_proxies.json

      - name: Commit + push if changed
        run: |
          if git diff --quiet -- public/risk_proxies.json; then
            echo "No changes to public/risk_proxies.json — skipping commit."
          else
            SIZE=$(wc -c < public/risk_proxies.json | awk '{print int($1/1024)}')
            git add public/risk_proxies.json
            git commit -m "Risk proxy feed auto-refresh [skip ci]

            File size: ${SIZE} KB
            Regenerated by .github/workflows/PORTFOLIO-RISK-PROXIES-DAILY.yml"
            git push || echo "Push failed (non-fatal); next scheduled run will retry."
          fi

      - name: Upload regenerated JSON as artifact
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: risk-proxies-${{ github.run_id }}
          path: public/risk_proxies.json
          retention-days: 7
          if-no-files-found: ignore
