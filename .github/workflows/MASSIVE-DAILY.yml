# MASSIVE-DAILY — daily refresh of Massive-sourced tables.
#
# Runs every weekday at three fire windows after US market close so a
# dropped GitHub schedule (which has happened — May 4 2026 incident)
# does not silently swallow the day's refresh:
#   - 22:00 UTC = 18:00 ET   (primary, ~30 min after market close)
#   - 00:00 UTC = 20:00 ET   (backup A, fires next-day Tue-Sat)
#   - 03:00 UTC = 23:00 ET   (backup B, fires next-day Tue-Sat)
# Backups B and A are no-ops when the primary already ran (the script
# is idempotent — universe + prices + corp actions all upsert by
# natural key, so re-running is safe).  Also triggerable on demand
# via workflow_dispatch.
#
# Same backfill script as the one-shot MASSIVE-INITIAL-BACKFILL, but
# with shorter dividends/splits lookback windows since most rows
# already exist from the initial backfill — daily run just catches
# new/revised records.
#
# Wall-clock target: ~4 min (universe ~3 min + EOD 5s + small div/split
# deltas).  Well inside the free-tier 5/min throttle.

name: MASSIVE-DAILY

on:
  schedule:
    # Cron is UTC. Three weekday fire windows so a dropped or delayed
    # GitHub schedule is recovered the same evening (idempotent script).
    - cron: "0 22 * * 1-5"   # Primary: Mon-Fri 18:00 ET
    - cron: "0 0  * * 2-6"   # Backup A: Mon-Fri 20:00 ET (Tue-Sat 00:00 UTC)
    - cron: "0 3  * * 2-6"   # Backup B: Mon-Fri 23:00 ET (Tue-Sat 03:00 UTC)
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run daily refresh
        env:
          MASSIVE_API_KEY:           ${{ secrets.MASSIVE_API_KEY }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DIVIDENDS_DAYS:            "7"
          SPLITS_DAYS:               "30"
          PYTHONUNBUFFERED:          "1"
        run: |
          python3 scripts/backfill_massive_initial.py
