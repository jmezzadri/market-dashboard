# MASSIVE-DAILY — daily refresh of Massive-sourced tables.
#
# Bug #YYYY-MM-DD (2026-05-14): previously the primary fired at 22:00 UTC
# (18:00 ET, 2 hours after the bell) and in practice ran 4-8 hours late
# via Backup B because GitHub Actions schedules drift. That left today's
# close out of prices_eod until ~2:30 AM ET the next morning, and the
# ticker-drawer headline rendered yesterday's $8.86 ONDS close next to
# a chart that already had today's $11.21. Primary fire moved up to
# 20:30 UTC (16:30 ET, ~30 min after market close) so today's close
# lands the same day. Older fires retained as backups in case the primary
# is dropped or delayed.
#
# Fire windows (UTC):
#   - 20:30 UTC = 16:30 ET (primary, ~30 min after market close)
#   - 21:00 UTC = 17:00 ET (backup A, ~1 h after close)
#   - 22:00 UTC = 18:00 ET (backup B, ~2 h after close — old primary)
#   - 00:00 UTC = 20:00 ET (backup C, fires next-day Tue-Sat)
#   - 03:00 UTC = 23:00 ET (backup D, fires next-day Tue-Sat)
# Backups are no-ops when an earlier window already wrote the day
# (the script is idempotent — universe + prices + corp actions all
# upsert by natural key, so re-running is safe).
# Also triggerable on demand via workflow_dispatch.
#
# Note on timing: this assumes US market close at 16:00 ET. During
# DST (most of the year, second Sunday in March → first Sunday in
# November) ET = UTC-4, so 16:30 ET = 20:30 UTC. In standard time
# ET = UTC-5, so 16:30 ET = 21:30 UTC. The 20:30 + 21:00 UTC primary
# pair covers DST; the 22:00 UTC backup covers standard time. All
# upserts are idempotent so an early-and-late fire pair is harmless.
#
# Same backfill script as the one-shot MASSIVE-INITIAL-BACKFILL, but
# with shorter dividends/splits lookback windows since most rows
# already exist from the initial backfill — daily run just catches
# new/revised records.
#
# Wall-clock target: ~4 min (universe ~3 min + EOD 5s + small div/split
# deltas).  Well inside the free-tier 5/min throttle.

name: MASSIVE-DAILY

on:
  schedule:
    # Cron is UTC. Same-day evening runs are best-effort scraps — Polygon's
    # T+0 batch right after the close only contains a few dozen tickers
    # (verified 2026-05-27: by 23:00 UTC the same day, only 63 of ~12,200
    # universe was ingested). The CANONICAL "panel is complete" run is the
    # next-morning window: between 02:00 and 08:00 ET the following day
    # Polygon publishes the full T+1 EOD batch and Massive pulls it.
    #
    # Same-day approximate runs (kept so dashboard tiles can show a rough
    # close intra-evening; script is idempotent so safe to re-fire):
    - cron: "30 20 * * 1-5"  # Mon-Fri 16:30 ET (DST primary)
    - cron: "0 21  * * 1-5"  # Mon-Fri 17:00 ET
    - cron: "0 22  * * 1-5"  # Mon-Fri 18:00 ET
    - cron: "0 0   * * 2-6"  # Mon-Fri 20:00 ET (next-day 00:00 UTC)
    - cron: "0 3   * * 2-6"  # Mon-Fri 23:00 ET (next-day 03:00 UTC)
    # Next-morning canonical "panel complete" runs (Joe directive 2026-05-27):
    - cron: "0 12  * * 2-6"  # Tue-Sat 08:00 ET (EDT) — catches Polygon T+1 batch
    - cron: "0 13  * * 2-6"  # Tue-Sat 08:00 ET (EST) — standard-time coverage
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run daily refresh
        env:
          MASSIVE_API_KEY:           ${{ secrets.MASSIVE_API_KEY }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DIVIDENDS_DAYS:            "7"
          SPLITS_DAYS:               "30"
          PYTHONUNBUFFERED:          "1"
        run: |
          python3 scripts/backfill_massive_initial.py
