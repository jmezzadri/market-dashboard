name: HORSE-RACE-V9-VS-EXTENDED

# Runs the v9 vs. v9_extended walk-forward back-test (scripts/horse_race_v9_vs_v9_extended.py).
# Compares current production AA engine (v9, 12 market factors) against v9_extended
# (v9 ∪ CCAR US-Domestic 16, ~22-23 unique factors after de-dup).
#
# Decision-support research per Joe directive 2026-04-27. Output is a JSON report
# at public/research/horse_race_v9_vs_extended.json — no production code change.
#
# Acceptance threshold (Joe-locked 2026-04-27 evening):
#   v9_extended is "meaningfully better" only if ALL of:
#     - annualized Sharpe ≥ v9 Sharpe + 0.10
#     - CAGR ≥ v9 CAGR
#     - max_drawdown ≤ v9 max_drawdown (less negative)
#
# Required GitHub secret: FRED_API_KEY (compute_v9_allocation pulls FRED inputs).

on:
  workflow_dispatch:

concurrency:
  group: horse-race
  cancel-in-progress: false

jobs:
  back-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name  "Market Dashboard Bot"
          git config user.email "bot@github-actions"

      - name: Run horse-race back-test
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          mkdir -p public/research
          python scripts/horse_race_v9_vs_v9_extended.py --start 2010-01-01

      - name: Commit + push horse-race report
        run: |
          git add public/research/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No horse-race report changes — skipping commit."
            exit 0
          fi
          AS_OF=$(date -u +%Y-%m-%d)
          git commit -m "HORSE-RACE — v9 vs v9_extended back-test ${AS_OF} [skip ci]

          Regenerated by .github/workflows/HORSE-RACE.yml"
          git push || echo "Push failed (non-fatal); next manual run can retry."

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: horse-race-${{ github.run_id }}
          path: public/research/
          retention-days: 90
          if-no-files-found: warn
