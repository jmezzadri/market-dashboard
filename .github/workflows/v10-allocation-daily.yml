name: v10-allocation-daily

# Daily compute of the v10 allocator. Reads public/cycle_board_snapshot.json
# (refreshed nightly by cycle-mechanisms-daily) and writes
# public/v10_allocation.json with today's recommended allocation.
#
# Schedule: 22:45 UTC weekdays — 15 minutes after cycle-mechanisms-daily so the
# input file is fresh.

on:
  schedule:
    # 08:15 ET morning runs (Joe directive 2026-05-27). Aligned with
    # Massive's next-morning panel-complete window so Asset Tilt and the
    # Trading Ops scanner are both based on the same close. Was 22:45 UTC
    # (18:45 ET same-day) which produced Asset Tilt on T-close data while
    # Trading Ops fell back to T-1 — the two engines disagreed by a day.
    # 12:15 UTC = 08:15 ET (EDT), 13:15 UTC = 08:15 ET (EST). Idempotent.
    - cron: "15 12 * * 2-6"
    - cron: "15 13 * * 2-6"
  workflow_dispatch:
  workflow_run:
    workflows: ["cycle-mechanisms-daily"]
    types: [completed]

concurrency:
  group: v10-allocation-daily
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v10 allocator
        run: python scripts/compute_v10_allocation.py

      - name: Audit hard rules
        run: |
          python -c "
          import json
          d = json.load(open('public/v10_allocation.json'))
          audit = d['rule_audit']
          assert audit['max_defensive_50pct'], 'defensive exceeds 50%'
          assert audit['max_leverage_1_5x'], 'leverage exceeds 1.5x'
          assert audit['defensive_xor_leverage'], 'defensive AND leverage both on'
          assert audit['all_6_mechanisms_used'], 'not all 6 mechanisms feeding'
          print('v10 audit OK |', d['as_of'], '| equity', d['equity_pct'], '| defensive', d['defensive_pct'], '| leverage', d['leverage'])
          "

      - name: Commit if changed
        run: |
          git config user.name "macrotilt-bot"
          git config user.email "macrotilt-bot@users.noreply.github.com"
          git add public/v10_allocation.json
          if git diff --cached --quiet; then
            echo "No changes — skipping."
          else
            git commit -m "chore(data): refresh v10_allocation — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
