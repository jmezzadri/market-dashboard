name: TRADING-OPPS-BACKTEST

# Runs the Trading Opportunities backtest / calibration engine
# (trading-scanner/scanner/trading_opps/backtest_engine.py) over the full
# production price + insider history, then — instead of committing the
# regenerated calibration straight to the live site — opens a PULL REQUEST
# with the regenerated calibrated_config.json + backtest_results.json for
# Senior Quant review.
#
# Why a PR and not an auto-commit: the quarterly recalibration changes the
# numbers the live screener scores on. Those must not ship without a human
# (Senior Quant) reading the run and signing off. The workflow regenerates
# and proposes; a person reviews and merges.
#
# The backtest pulls ~1.3M price rows + full insider history from Supabase and
# runs for several minutes, so it cannot run in a short-lived shell — only here,
# where there is no time cap.
#
# Required GitHub secrets (already configured for SCREENER_TRADING_OPPS_DAILY):
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY

on:
  workflow_dispatch:
  schedule:
    # Quarterly: 11:00 UTC on the first of Jan/Apr/Jul/Oct — the standing
    # re-calibration cadence from the overhaul plan (Part 7, item D1).
    - cron: '0 11 1 1,4,7,10 *'

concurrency:
  group: trading-opps-backtest
  cancel-in-progress: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      - name: Configure git
        run: |
          git config user.name  "Market Dashboard Bot"
          git config user.email "bot@github-actions"

      - name: Unit tests — no-lookahead structural checks (gates the run)
        working-directory: trading-scanner/scanner/trading_opps
        run: python3 test_backtest_engine.py

      - name: Run the full backtest (fresh Supabase pull)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python3 trading-scanner/scanner/trading_opps/backtest_engine.py --pull

      - name: Open a review PR with the regenerated calibration
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          CFG=trading-scanner/scanner/trading_opps/calibrated_config.json
          RES=trading-scanner/scanner/trading_opps/backtest_results.json
          git add "$CFG" "$RES"
          if git diff --cached --quiet; then
            echo "No changes in the two JSON artifacts — nothing to review, skipping PR."
            exit 0
          fi
          AS_OF=$(date -u +%Y-%m-%d)
          BRANCH="quant/trading-opps-recalibration-${AS_OF}"
          git checkout -b "$BRANCH"
          git commit -m "Trading Opps recalibration — ${AS_OF} (Senior Quant review)

          Regenerated calibrated_config.json + backtest_results.json by
          .github/workflows/TRADING-OPPS-BACKTEST.yml. This does NOT ship
          automatically — it is opened as a PR for Senior Quant review."
          git push -u origin "$BRANCH"
          # Headline numbers for the reviewer (best-effort — never block on a parse miss).
          SUMMARY=$(python3 -c "import json; r=json.load(open('$RES')); p=r.get('final_long_performance',{}).get('21',{}); print('n=%s, win rate=%.0f%%, avg return=%.2f%%, profit factor=%.2f' % (p.get('n','?'), (p.get('win_rate') or 0)*100, (p.get('avg_return') or 0)*100, p.get('profit_factor') or 0))" 2>/dev/null || echo "see backtest_results.json")
          {
            echo "Automated quarterly recalibration of the Trading Opportunities screener."
            echo ""
            echo "**This does not ship automatically — the Senior Quant must review and merge.**"
            echo ""
            echo "Regenerated insider-layer headline (T+21, 1-month horizon): ${SUMMARY}"
            echo ""
            echo "Files in this PR:"
            echo "- calibrated_config.json — the calibration the live engine reads."
            echo "- backtest_results.json — every number behind it, pinned."
            echo ""
            echo "Senior Quant review checklist:"
            echo "- [ ] Point values still derive from each rule's measured edge (no gut-set numbers)."
            echo "- [ ] Lookahead audit clean in the run log."
            echo "- [ ] Any large move vs. the previous calibration is explained."
            echo "- [ ] The dark-pool / options blocks and scoring_version survived regeneration."
            echo "- [ ] Launch threshold still appropriate for the current score scale."
            echo ""
            echo "Generated by .github/workflows/TRADING-OPPS-BACKTEST.yml"
          } > /tmp/pr_body.md
          gh pr create \
            --base main --head "$BRANCH" \
            --title "Trading Opps quarterly recalibration — ${AS_OF} — Senior Quant review required" \
            --body-file /tmp/pr_body.md

      - name: Upload backtest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-opps-backtest-${{ github.run_id }}
          path: |
            trading-scanner/scanner/trading_opps/calibrated_config.json
            trading-scanner/scanner/trading_opps/backtest_results.json
            trading-scanner/scanner/trading_opps/TRADING_OPPS_PHASE2_BACKTEST_REPORT_2026-05-20.md
          retention-days: 90
          if-no-files-found: warn
