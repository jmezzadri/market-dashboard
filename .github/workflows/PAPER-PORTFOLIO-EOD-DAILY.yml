name: PAPER-PORTFOLIO-EOD-DAILY

# MacroTilt paper-portfolio EOD phase.
#   1. Translator: Asset Tilt + Equity Scanner -> pending paper_orders rows.
#   2. Submitter:  pending -> Alpaca paper MOO submissions (time_in_force=opg).
#
# Pipeline name (Data Steward convention): paper-portfolio-eod-daily
# Pre-flight:
#   * Sleeve A signal source - public/v10_allocation.json (refreshed by
#     INDICATOR-REFRESH_7AM_WEEKDAYS earlier in the day).
#   * Sleeve B signal source - public.signal_intel_v5_daily (refreshed by
#     SCAN workflows after the 3:30 PM close).
#   Both reflect the PRIOR day's close and are available all night, so an
#   early-morning submission is correct, not premature.
#
# ---------------------------------------------------------------------------
# 2026-05-31 RELIABILITY FIX (Data Steward + Lead Developer sign-off)
# ---------------------------------------------------------------------------
# Symptom: no live rebalance since 2026-05-27. The job ran daily and logged
# "success" but never submitted, because GitHub's scheduled-cron delivery was
# running 1.5-4 HOURS late (observed schedule runs landed 10:43 / 10:57 /
# 13:23 ET) - always past the old 08:00-09:25 ET submit window, so every run
# hit the window guard and exited as a no-op.
#
# Why the fix is safe: these are market-on-open ('opg' TIF) orders. Alpaca
# routes them to the NEXT opening auction regardless of when they are
# submitted before that open. So submitting any time from early-morning up
# to ~09:25 ET still executes at the 09:30 open. We therefore:
#   (a) widen the accept window to 04:00-09:25 ET, and
#   (b) fire many redundant morning attempts (every 30 min, 08:30-13:30 UTC
#       weekdays) so that even a multi-hour-delayed delivery still lands
#       inside the accept window.
# The first attempt that lands does the work; all later attempts are clean
# no-ops via the paper_orders client_order_id idempotency key (duplicate
# intents are repaired, never re-fired). This mirrors the proven multi-window
# pattern already used by MASSIVE-DAILY for the same "GitHub drops crons"
# failure (see pipeline_schedule.yml).
#
# Required GitHub secrets:
#   SUPABASE_ACCESS_TOKEN     - read paper_accounts + signal_intel_v5_daily,
#                                write paper_signal_capture + paper_orders.
#   SUPABASE_URL              - Supabase project URL (used by sub-readers).
#   ALPACA_PAPER_KEY_ID       - Alpaca paper API key.
#   ALPACA_PAPER_SECRET       - Alpaca paper API secret.
#   ALPACA_PAPER_BASE_URL     - default https://paper-api.alpaca.markets
#   PAPER_LIVE_TRADING_ENABLED - must equal 'true' to submit live (ENABLED).

on:
  schedule:
    # Redundant morning attempts every 30 min. The ET window guard below
    # filters them; the first one that lands in 04:00-09:25 ET submits and
    # the rest are idempotent no-ops. Spanning 08:30-13:30 UTC covers both
    # DST offsets and absorbs multi-hour GitHub scheduler delays.
    - cron: '30 8 * * 1-5'
    - cron: '0 9 * * 1-5'
    - cron: '30 9 * * 1-5'
    - cron: '0 10 * * 1-5'
    - cron: '30 10 * * 1-5'
    - cron: '0 11 * * 1-5'
    - cron: '30 11 * * 1-5'
    - cron: '0 12 * * 1-5'
    - cron: '30 12 * * 1-5'
    - cron: '0 13 * * 1-5'
    - cron: '30 13 * * 1-5'
  # Chain off the Trading Ops scanner so the queue can fire the moment the
  # morning panel is ready. The ET window guard makes any out-of-window
  # completion chain a harmless no-op.
  workflow_run:
    workflows: ["SCREENER_TRADING_OPPS_DAILY"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (compute, no DB writes, no Alpaca submission)'
        required: false
        default: 'false'

concurrency:
  group: paper-portfolio-eod
  cancel-in-progress: false

jobs:
  eod:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Pre-open submit window guard
        id: window
        # Accept any fire from 04:00 ET up to 09:25 ET. 'opg' orders route to
        # the 09:30 open no matter when (pre-open) they are submitted, so an
        # early or late-delivered timer still trades at the open. Manual
        # dry-runs always proceed.
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch - proceeding."
            exit 0
          fi
          H=$(TZ=America/New_York date +%H)
          M=$(TZ=America/New_York date +%M)
          MINS=$((10#$H * 60 + 10#$M))
          # 04:00 ET = 240 minutes, 09:25 ET = 565 minutes.
          if [ "$MINS" -ge 240 ] && [ "$MINS" -le 565 ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "Pre-open window ($H:$M ET) - proceeding to queue trades."
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "Outside pre-open window ($H:$M ET) - no-op."
          fi

      - name: Check out market-dashboard
        if: steps.window.outputs.proceed == 'true'
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        if: steps.window.outputs.proceed == 'true'
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.window.outputs.proceed == 'true'
        run: |
          pip install requests pandas pyarrow numpy scipy

      - name: Run EOD phase (translator + submitter)
        if: steps.window.outputs.proceed == 'true'
        # Live-submission guard: PAPER_LIVE_TRADING_ENABLED must equal the
        # literal 'true' in repo secrets for the submitter to POST orders to
        # Alpaca; any other value downgrades to dry-run. Currently ENABLED.
        # The runner's own freshness gate independently blocks submission and
        # names the stale input if either sleeve is not current for the
        # session, so a bad data day is a clean skip, never a bad trade.
        env:
          SUPABASE_ACCESS_TOKEN:        ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_URL:                 ${{ secrets.SUPABASE_URL }}
          ALPACA_PAPER_KEY_ID:          ${{ secrets.ALPACA_PAPER_KEY_ID }}
          ALPACA_PAPER_SECRET:          ${{ secrets.ALPACA_PAPER_SECRET }}
          ALPACA_PAPER_BASE_URL:        ${{ secrets.ALPACA_PAPER_BASE_URL }}
          PAPER_LIVE_TRADING_ENABLED:   ${{ secrets.PAPER_LIVE_TRADING_ENABLED }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python -m paper_portfolio.runner --phase eod --dry-run
          else
            python -m paper_portfolio.runner --phase eod
          fi
