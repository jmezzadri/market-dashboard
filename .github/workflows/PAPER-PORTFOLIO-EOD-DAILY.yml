name: PAPER-PORTFOLIO-EOD-DAILY

# MacroTilt paper-portfolio EOD phase.
#   1. Translator: Asset Tilt + Equity Scanner → pending paper_orders rows.
#   2. Submitter:  pending → Alpaca paper MOO submissions (time_in_force=opg).
#
# Pipeline name (Data Steward convention): paper-portfolio-eod-daily
# Pre-flight:
#   * Sleeve A signal source — public/v10_allocation.json (refreshed by
#     INDICATOR-REFRESH_7AM_WEEKDAYS earlier in the day).
#   * Sleeve B signal source — public.signal_intel_v5_daily (refreshed by
#     SCAN workflows after the 3:30 PM close).
# Both must be current as of today before this workflow runs.
#
# Schedule (Data Steward standard slot for portfolio surfaces):
#   * 20:30 UTC = 4:30 PM EDT (UTC-4) / 3:30 PM EST (UTC-5) — after market close.
#   * Submission is routed by Alpaca to NEXT trading day's opening auction.
#   * Weekdays only. Holiday calendar handled by Alpaca's `is_open` clock —
#     a non-trading day yields zero pending rows and the submitter is a no-op.
#
# Required GitHub secrets:
#   SUPABASE_ACCESS_TOKEN     — read paper_accounts + signal_intel_v5_daily,
#                                write paper_signal_capture + paper_orders.
#   SUPABASE_URL              — Supabase project URL (used by sub-readers).
#   ALPACA_PAPER_KEY_ID       — Alpaca paper API key.
#   ALPACA_PAPER_SECRET       — Alpaca paper API secret.
#   ALPACA_PAPER_BASE_URL     — default https://paper-api.alpaca.markets

on:
  schedule:
    # 09:00 ET morning runs — between scanner completion (~08:30 ET) and
    # market open (09:30 ET). Joe directive 2026-05-27: queue trades for
    # the upcoming open ONCE both Asset Tilt and Trading Ops are fresh on
    # the prior day's close. Was 20:30 UTC (16:30 ET same-day) which fired
    # before Trading Ops had a complete close to scan against.
    # 13:00 UTC = 09:00 ET (EDT), 14:00 UTC = 09:00 ET (EST). Idempotent
    # via paper_orders client_order_id — duplicate intents are repaired,
    # not re-fired.
    - cron: '0 13 * * 2-6'
    - cron: '0 14 * * 2-6'
  # Chain off the Trading Ops scanner so the queue fires as soon as the
  # morning scanner finishes. A pre-open WINDOW GUARD (see the first job
  # step) means only the morning run (08:00-09:25 ET) actually submits;
  # the scanner's evening re-runs trigger this workflow but exit as clean
  # no-ops, so we "queue once" per Joe's directive without losing the
  # reliability of firing the moment the morning panel is ready.
  workflow_run:
    workflows: ["SCREENER_TRADING_OPPS_DAILY"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (compute, no DB writes, no Alpaca submission)'
        required: false
        default: 'false'

concurrency:
  group: paper-portfolio-eod
  cancel-in-progress: false

jobs:
  eod:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Pre-open submit window guard
        id: window
        # Only submit in the morning pre-open window (08:00-09:25 ET). This
        # makes the scanner's evening completion chains harmless no-ops while
        # keeping the morning trigger. Manual dry-runs always proceed.
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — proceeding."
            exit 0
          fi
          H=$(TZ=America/New_York date +%H)
          M=$(TZ=America/New_York date +%M)
          MINS=$((10#$H * 60 + 10#$M))
          # 08:00 ET = 480 minutes, 09:25 ET = 565 minutes.
          if [ "$MINS" -ge 480 ] && [ "$MINS" -le 565 ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "Pre-open window ($H:$M ET) — proceeding to queue trades."
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "Outside pre-open window ($H:$M ET) — no-op (queue once in the morning)."
          fi

      - name: Check out market-dashboard
        if: steps.window.outputs.proceed == 'true'
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        if: steps.window.outputs.proceed == 'true'
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.window.outputs.proceed == 'true'
        run: |
          pip install requests pandas pyarrow numpy scipy

      - name: Run EOD phase (translator + submitter)
        if: steps.window.outputs.proceed == 'true'
        # Live-submission guard: PAPER_LIVE_TRADING_ENABLED must equal the
        # literal 'true' in repo secrets for the submitter to POST orders to
        # Alpaca; any other value downgrades to dry-run. Currently ENABLED.
        # The runner's own freshness gate independently blocks submission and
        # names the stale input if either sleeve is not current for the
        # session, so a bad data day is a clean skip, never a bad trade.
        env:
          SUPABASE_ACCESS_TOKEN:        ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_URL:                 ${{ secrets.SUPABASE_URL }}
          ALPACA_PAPER_KEY_ID:          ${{ secrets.ALPACA_PAPER_KEY_ID }}
          ALPACA_PAPER_SECRET:          ${{ secrets.ALPACA_PAPER_SECRET }}
          ALPACA_PAPER_BASE_URL:        ${{ secrets.ALPACA_PAPER_BASE_URL }}
          PAPER_LIVE_TRADING_ENABLED:   ${{ secrets.PAPER_LIVE_TRADING_ENABLED }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python -m paper_portfolio.runner --phase eod --dry-run
          else
            python -m paper_portfolio.runner --phase eod
          fi
