name: ANALYST_INGEST_DAILY

# Daily ingest of UW /screener/analysts -> analyst_ratings_daily.
# Walks the v5 universe ticker-by-ticker. ~3,500 tickers * 0.4s = ~25 min.

on:
  schedule:
    - cron: '20 10 * * 1-5'    # 06:20 ET EDT
    - cron: '20 11 * * 1-5'    # 06:20 ET EST
  workflow_dispatch:
    inputs:
      limit:
        description: "Only ingest first N tickers (testing)"
        required: false
      tickers:
        description: "Comma-separated explicit ticker list (overrides universe)"
        required: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Idempotency gate — only run at the expected America/New_York local hour
        # DST guard: each workflow has two cron lines (one for EDT, one for EST).
        # Both fire most of the year. This step skips whichever one isn't at the
        # expected ET local hour, so the feed runs once a day, not twice.
        if: github.event_name == 'schedule'
        run: |
          ET_HOUR=$(TZ=America/New_York date +%H)
          EXPECTED='06'
          if [ "$ET_HOUR" != "$EXPECTED" ]; then
            echo "::notice::Current ET hour is $ET_HOUR, expected $EXPECTED. The other DST cron line owns this slot. Skipping."
            echo "SKIP_RUN=true" >> "$GITHUB_ENV"
          else
            echo "✓ ET hour matches expected ($EXPECTED) — proceeding."
          fi

      - uses: actions/checkout@v4
        if: env.SKIP_RUN != 'true'
      - uses: actions/setup-python@v5
        if: env.SKIP_RUN != 'true'
        with:
          python-version: '3.11'

      - name: Install scanner deps
        if: env.SKIP_RUN != 'true'
        working-directory: trading-scanner
        run: |
          pip install --upgrade pip
          pip install requests

      - name: Run ingest
        if: env.SKIP_RUN != 'true'
        working-directory: trading-scanner
        env:
          UNUSUAL_WHALES_API_KEY: ${{ secrets.UNUSUAL_WHALES_API_KEY }}
          UW_CLIENT_API_ID: ${{ secrets.UW_CLIENT_API_ID || '100001' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.limit }}" ]; then ARGS="--limit ${{ inputs.limit }}"; fi
          if [ -n "${{ inputs.tickers }}" ]; then ARGS="--tickers ${{ inputs.tickers }}"; fi
          PYTHONPATH=. python3 -m scanner.signal_intelligence_v5.analyst_ingest \
            --max-seconds 2400 $ARGS

      - name: Surface row count
        if: env.SKIP_RUN != 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -s -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
                  -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
                  -H "Prefer: count=exact" \
                  "$SUPABASE_URL/rest/v1/analyst_ratings_daily?select=ticker&limit=1" \
                  -I 2>&1 | grep -i content-range || true
