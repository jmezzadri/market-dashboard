name: V11-CYCLE-MECHANISM_DAILY

# Recomputes public/methodology_calibration_v11.json — the calibration source
# for the v11 Cycle Mechanism Board on the Macro Overview page. Reads the
# just-refreshed indicator_history.json and produces per-mechanism scores +
# state labels (Normal / Cautionary / Stressed / Distressed).
#
# Item #2 of Joe's approved 12-PR sequence (data_triage.html row 158 + Phase 3
# prep section). Ships the calibration output on a real cron so the cycle board
# stops reading a stale workspace draft.
#
# Schedule notes (per data_triage.html schedule rationalization):
#   - Runs 06:30 ET weekdays — chained 30 min after INDICATOR-REFRESH so the
#     calibration reads fresh indicator inputs.
#   - 10:30 UTC = 06:30 EDT (UTC-4) / 05:30 EST (UTC-5). Acceptable drift; the
#     30-min spacing from INDICATOR-REFRESH at 10:00 UTC holds either way.
#
# Required GitHub secrets: FRED_API_KEY (also used by INDICATOR-REFRESH).

on:
  schedule:
    - cron: '30 10 * * 1-5'
  workflow_dispatch:

concurrency:
  group: v11-cycle-mechanism
  cancel-in-progress: false

jobs:
  recompute:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Check out market-dashboard
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name  "Market Dashboard Bot"
          git config user.email "bot@github-actions"

      - name: Recompute v11 cycle mechanism calibration
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python compute_v11_sprint1_calibration.py --out public/methodology_calibration_v11.json

      - name: Commit + push v11 calibration if changed
        run: |
          if git diff --quiet -- public/methodology_calibration_v11.json; then
            echo "No changes to public/methodology_calibration_v11.json — skipping commit."
          else
            git add public/methodology_calibration_v11.json
            git commit -m "v11 cycle mechanism calibration auto-refresh [skip ci]

            Regenerated by .github/workflows/V11-CYCLE-MECHANISM_DAILY.yml
            Reads: public/indicator_history.json (post INDICATOR-REFRESH 10:00 UTC run)
            Writes: public/methodology_calibration_v11.json"
            git push || echo "Push failed (non-fatal); next scheduled run will retry."
          fi

      - name: Upload calibration as artifact
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: v11-calibration-${{ github.run_id }}
          path: public/methodology_calibration_v11.json
          retention-days: 7
          if-no-files-found: ignore
