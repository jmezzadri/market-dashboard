name: SCENARIO-PRECOMPUTE-WEEKLY

# Regenerates public/scenario_allocations.json once a week, the night after
# V9-ALLOCATION-WEEKLY runs. This file feeds the L4 panel of the Scenario
# Analysis tab — eight historical CCAR-anchored stress scenarios re-running
# the v9 optimizer with translated factor inputs.
#
# Why weekly + after V9-ALLOCATION-WEEKLY:
#   - The same WINDOW=60-month regression is used; running scenario stress
#     more often than the underlying allocation re-fit is wasted compute.
#   - The script imports compute_v9_allocation, so it relies on the same
#     factor history snapshots V9-ALLOCATION-WEEKLY consumes.
#
# Required GitHub secrets:
#   FRED_API_KEY  — same key V9-ALLOCATION-WEEKLY uses.
#
# Manual trigger: Actions → SCENARIO-PRECOMPUTE-WEEKLY → Run workflow.

on:
  schedule:
    # 13:30 UTC Saturday = 9:30 AM EDT / 8:30 AM EST.
    # V9-ALLOCATION-WEEKLY posts at 12:00 UTC Saturday, so by 13:30 the
    # current allocation snapshot + indicator history are on main.
    - cron: '30 13 * * 6'
  workflow_dispatch:

concurrency:
  group: scenario-precompute-weekly
  cancel-in-progress: false

jobs:
  precompute:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Check out market-dashboard
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name  "Market Dashboard Bot"
          git config user.email "bot@github-actions"

      - name: Run scenario precompute
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/precompute_scenario_allocations.py

      - name: Commit + push if changed
        run: |
          git add public/scenario_allocations.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to scenario_allocations.json — skipping commit."
            exit 0
          fi

          AS_OF=$(python -c "import json; print(json.load(open('public/scenario_allocations.json')).get('as_of', 'unknown'))")
          git commit -m "Scenario allocations precompute — as of ${AS_OF} [skip ci]

          Regenerated by .github/workflows/SCENARIO-PRECOMPUTE-WEEKLY.yml"

          git push || echo "Push failed (non-fatal); next scheduled run will retry."

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: scenario-allocations-${{ github.run_id }}
          path: public/scenario_allocations.json
          retention-days: 30
          if-no-files-found: ignore
