name: DARKPOOL_INGEST_DAILY

# Phase 1 of the Trading Opportunities overhaul — dark-pool block prints.
#
# Pulls the last few days of UW per-ticker off-exchange block prints for
# every name in the screener universe into public.darkpool_prints, then
# prunes prints older than the rolling retention window. Idempotent UPSERT
# on tracking_id — a re-run, or both DST cron lines firing, is a no-op.
#
# Normalized EOD market-data slot: 16:30 ET weekdays (per pipeline_schedule.yml).
#
# Required GitHub secrets (already configured for the other UW ingests):
#   UNUSUAL_WHALES_API_KEY
#   UW_CLIENT_API_ID            (default: 100001)
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY   (table writes)
#   SUPABASE_ACCESS_TOKEN       (Management API — universe query)

on:
  schedule:
    # 16:30 ET = 20:30 UTC (EDT) / 21:30 UTC (EST). Weekdays only.
    - cron: '30 20 * * 1-5'
    - cron: '30 21 * * 1-5'
  workflow_dispatch:
    inputs:
      as_of:
        description: "YYYY-MM-DD anchor date (default: today UTC)"
        required: false
      days_back:
        description: "Calendar days to query per ticker (default: 3)"
        required: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scanner deps
        working-directory: trading-scanner
        run: |
          pip install --upgrade pip
          pip install requests

      - name: Run dark-pool ingest
        working-directory: trading-scanner
        env:
          UNUSUAL_WHALES_API_KEY: ${{ secrets.UNUSUAL_WHALES_API_KEY }}
          UW_CLIENT_API_ID: ${{ secrets.UW_CLIENT_API_ID || '100001' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.as_of }}" ]; then
            ARGS="$ARGS --as-of ${{ inputs.as_of }}"
          fi
          if [ -n "${{ inputs.days_back }}" ]; then
            ARGS="$ARGS --days-back ${{ inputs.days_back }}"
          fi
          PYTHONPATH=. python3 -m scanner.trading_opps.darkpool_ingest \
            --max-seconds 8400 $ARGS

      - name: Surface row count
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -s -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
                  -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
                  -H "Prefer: count=exact" \
                  "$SUPABASE_URL/rest/v1/darkpool_prints?select=tracking_id&limit=1" \
                  -I 2>&1 | grep -i content-range || true
