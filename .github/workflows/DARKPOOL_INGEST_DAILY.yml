name: DARKPOOL_INGEST_DAILY

# Phase 1 of the Trading Opportunities overhaul — dark-pool block prints.
#
# Pulls the last few days of UW per-ticker off-exchange block prints for
# every name in the screener-candidate universe into public.darkpool_prints,
# then prunes prints older than the rolling retention window. Idempotent
# UPSERT on tracking_id — a re-run is a no-op.
#
# Normalized EOD market-data slot: 16:00 ET weekdays.
#
# Required GitHub secrets (already configured for the other UW ingests):
#   UNUSUAL_WHALES_API_KEY
#   UW_CLIENT_API_ID            (default: 100001)
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY   (table writes)
#   SUPABASE_ACCESS_TOKEN       (Management API — universe query)

on:
  schedule:
    # 16:30 ET = 20:30 UTC (EDT) / 21:30 UTC (EST). Weekdays only.
    - cron: '30 20 * * 1-5'
    - cron: '30 21 * * 1-5'
  workflow_dispatch:
    inputs:
      as_of:
        description: "YYYY-MM-DD anchor date (default: today UTC)"
        required: false
      days_back:
        description: "Calendar days to query per ticker (default: 3)"
        required: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - name: Idempotency gate — only run at the expected America/New_York local hour
        # DST guard: each workflow has two cron lines (one for EDT, one for EST).
        # Both fire most of the year. This step skips whichever one isn't at the
        # expected ET local hour, so the feed runs once a day, not twice.
        if: github.event_name == 'schedule'
        run: |
          ET_HOUR=$(TZ=America/New_York date +%H)
          EXPECTED='16'
          if [ "$ET_HOUR" != "$EXPECTED" ]; then
            echo "::notice::Current ET hour is $ET_HOUR, expected $EXPECTED. The other DST cron line owns this slot. Skipping."
            echo "SKIP_RUN=true" >> "$GITHUB_ENV"
          else
            echo "✓ ET hour matches expected ($EXPECTED) — proceeding."
          fi

      - uses: actions/checkout@v4
        if: env.SKIP_RUN != 'true'
      - uses: actions/setup-python@v5
        if: env.SKIP_RUN != 'true'
        with:
          python-version: '3.11'

      - name: Install scanner deps
        if: env.SKIP_RUN != 'true'
        working-directory: trading-scanner
        run: |
          pip install --upgrade pip
          pip install requests

      - name: Run dark-pool ingest
        if: env.SKIP_RUN != 'true'
        working-directory: trading-scanner
        env:
          UNUSUAL_WHALES_API_KEY: ${{ secrets.UNUSUAL_WHALES_API_KEY }}
          UW_CLIENT_API_ID: ${{ secrets.UW_CLIENT_API_ID || '100001' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.as_of }}" ]; then
            ARGS="$ARGS --as-of ${{ inputs.as_of }}"
          fi
          if [ -n "${{ inputs.days_back }}" ]; then
            ARGS="$ARGS --days-back ${{ inputs.days_back }}"
          fi
          PYTHONPATH=. python3 -m scanner.trading_opps.darkpool_ingest \
            --max-seconds 8400 $ARGS

      - name: Surface row count
        if: env.SKIP_RUN != 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -s -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
                  -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
                  -H "Prefer: count=exact" \
                  "$SUPABASE_URL/rest/v1/darkpool_prints?select=tracking_id&limit=1" \
                  -I 2>&1 | grep -i content-range || true
