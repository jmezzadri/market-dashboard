name: INDICATOR-REFRESH_7AM_WEEKDAYS

# Regenerates public/indicator_history.json from FRED + Yahoo daily so the
# dashboard picks up fresh values (20y cadence, 15y Winsorized stats) without
# a manual pull. Then runs compute_composite_history.py to advance
# public/composite_history_daily.json with the new indicator values.
#
# Why a separate workflow (vs. bolting onto daily-brief.yml):
#   - daily-brief runs at 3:50 PM and depends on the scanner's 3:30 PM step;
#     indicator history only needs overnight FRED/Yahoo data, so morning is
#     fine and decouples it from scanner-day behavior.
#   - This file touches public/indicator_history.json (~1.2 MB). Isolating it
#     means the daily-brief commit log stays clean and revertable.
#
# Required GitHub secrets:
#   FRED_API_KEY     — FRED API key used by fetch_history.py
#
# Manual trigger: Actions → Indicator History Refresh → Run workflow.
#
# Schedule notes (2026-04-29, bug #1130):
#   The morning 11:00 UTC run is too early for FRED daily series that publish
#   in the late afternoon (e.g. DFII10 / 10Y Real Rates publishes around
#   20:00 UTC). To capture late-publishers same-day we add a second run at
#   22:00 UTC (6pm ET). The morning run remains as the primary so downstream
#   consumers that expect morning data are unaffected.

on:
  schedule:
    # 10:00 UTC = 6:00 AM EDT (UTC-4) / 5:00 AM EST (UTC-5).
    # Data Steward standard slot for daily slow-data pulls (Joe directive 2026-04-30,
    # Phase 2 schedule normalization). Was 0 11 (7:00 EDT) — moved one hour earlier so
    # the morning indicator pull is settled before any 6:00-window consumer reads.
    # Catches series that publish overnight and prior-day morning releases.
    - cron: '0 10 * * 1-5'
    # 22:00 UTC = 6:00 PM EDT (UTC-4) / 5:00 PM EST (UTC-5).
    # Catches FRED daily series that publish in the late afternoon
    # (e.g. DFII10 around 20:00 UTC). See bug #1130.
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

concurrency:
  group: indicator-history-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Check out market-dashboard
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name  "Market Dashboard Bot"
          git config user.email "bot@github-actions"

      - name: Regenerate indicator_history.json
        env:
          FRED_API_KEY:              ${{ secrets.FRED_API_KEY }}
          # Supabase env vars added 2026-05-27 so the fetcher can sync
          # pipeline_health.data_as_of at the end of the run. Without this
          # the freshness chip on every card on /indicators reads a stale
          # data_as_of from pipeline_health and renders Red on fresh data.
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python fetch_history.py

      - name: Commit + push indicator history if changed
        run: |
          if git diff --quiet -- public/indicator_history.json; then
            echo "No changes to public/indicator_history.json — skipping commit."
          else
            SIZE=$(wc -c < public/indicator_history.json | awk '{print int($1/1024)}')
            git add public/indicator_history.json
            git commit -m "Indicator history auto-refresh [skip ci]

            File size: ${SIZE} KB
            Regenerated by .github/workflows/INDICATOR-REFRESH_7AM_WEEKDAYS.yml"
            git push || echo "Push failed (non-fatal); next scheduled run will retry."
          fi
      # PR λ (2026-05-02): composite recompute step removed — composites killed.


      - name: Compute v9 Asset Allocation (current picks)
        # Reads the just-refreshed indicator_history.json + composite_history_daily.json,
        # computes the current v9 allocation (5 picks, defensive split, leverage state),
        # writes public/v9_allocation.json. Methodology v9 LOCKED 2026-04-25 — see
        # asset-allocation-methodology-v9-LOCKED.md.
        env:
          FRED_API_KEY:              ${{ secrets.FRED_API_KEY }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python compute_v9_allocation.py

      - name: Commit + push v9 allocation if changed
        run: |
          if git diff --quiet -- public/v9_allocation.json; then
            echo "No changes to public/v9_allocation.json — skipping commit."
          else
            git add public/v9_allocation.json
            git commit -m "v9 allocation auto-refresh [skip ci]

            Regenerated by .github/workflows/INDICATOR-REFRESH_7AM_WEEKDAYS.yml"
            git push || echo "Push failed (non-fatal); next scheduled run will retry."
          fi

      - name: Upload regenerated JSON as artifact
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: indicator-history-${{ github.run_id }}
          path: |
            public/indicator_history.json
            public/v9_allocation.json
          retention-days: 7
          if-no-files-found: ignore
