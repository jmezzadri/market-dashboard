name: INDICATOR-REFRESH_7AM_WEEKDAYS

# Regenerates public/indicator_history.json from FRED + Yahoo daily so the
# dashboard picks up fresh values (20y cadence, 15y Winsorized stats) without
# a manual pull. Then runs compute_composite_history.py to advance
# public/composite_history_daily.json with the new indicator values.
#
# Why a separate workflow (vs. bolting onto daily-brief.yml):
#   - daily-brief runs at 3:50 PM and depends on the scanner's 3:30 PM step;
#     indicator history only needs overnight FRED/Yahoo data, so morning is
#     fine and decouples it from scanner-day behavior.
#   - This file touches public/indicator_history.json (~1.2 MB). Isolating it
#     means the daily-brief commit log stays clean and revertable.
#
# Required GitHub secrets:
#   FRED_API_KEY     — FRED API key used by fetch_history.py
#
# Manual trigger: Actions → Indicator History Refresh → Run workflow.

on:
  schedule:
    # 11:00 UTC = 7:00 AM EDT (UTC-4) / 6:00 AM EST (UTC-5).
    # FRED updates through the morning; this gives us the bulk of prior-day
    # releases and catches anything that posted overnight.
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

concurrency:
  group: indicator-history-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Check out market-dashboard
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name  "Market Dashboard Bot"
          git config user.email "bot@github-actions"

      - name: Regenerate indicator_history.json
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python fetch_history.py

      - name: Commit + push indicator history if changed
        run: |
          if git diff --quiet -- public/indicator_history.json; then
            echo "No changes to public/indicator_history.json — skipping commit."
          else
            SIZE=$(wc -c < public/indicator_history.json | awk '{print int($1/1024)}')
            git add public/indicator_history.json
            git commit -m "Indicator history auto-refresh [skip ci]

            File size: ${SIZE} KB
            Regenerated by .github/workflows/INDICATOR-REFRESH_7AM_WEEKDAYS.yml"
            git push || echo "Push failed (non-fatal); next scheduled run will retry."
          fi

      - name: Recompute composite history (Today's Macro dials)
        # Append-only: reads the just-refreshed indicator_history.json and
        # advances public/composite_history_daily.json by however many trading
        # days have elapsed since the last row. No-op if already current.
        # Methodology: EWMA z-score (18mo half-life, ±3σ winsorized) per
        # indicator, weight-averaged per composite using composite_weights.json,
        # ×50 and clipped to ±100. Bug #1036 — see compute_composite_history.py
        # for full doc.
        run: python compute_composite_history.py

      - name: Commit + push composite history if changed
        run: |
          if git diff --quiet -- public/composite_history_daily.json; then
            echo "No changes to public/composite_history_daily.json — skipping commit."
          else
            ROWS=$(python3 -c "import json; print(len(json.load(open('public/composite_history_daily.json'))))")
            git add public/composite_history_daily.json
            git commit -m "Composite history auto-refresh [skip ci]

            Total rows: ${ROWS}
            Regenerated by .github/workflows/INDICATOR-REFRESH_7AM_WEEKDAYS.yml"
            git push || echo "Push failed (non-fatal); next scheduled run will retry."
          fi

      - name: Upload regenerated JSON as artifact
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: indicator-history-${{ github.run_id }}
          path: |
            public/indicator_history.json
            public/composite_history_daily.json
          retention-days: 7
          if-no-files-found: ignore
