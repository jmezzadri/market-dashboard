name: SCREENER_TRADING_OPPS_DAILY

# Phase 3 of the Trading Opportunities overhaul — the nightly screener producer.
#
# Runs the Phase 2 backtest-calibrated dual-direction screener (insider + trend
# layers, with the 15-day-plateau insider age-decay) over the eligible universe
# for the latest complete close, and appends one dated snapshot row per launched
# name into public.trading_opps_signals. Append-only — earlier scan_dates are
# never overwritten, so the page can read a name's score one week / one month
# ago straight off an older snapshot.
#
# Pipeline name: screener-trading-opps-daily
#
# TRIGGER MODEL (changed 2026-05-27):
#   Previously a cron at 19:00 ET that raced with MASSIVE-DAILY. Now triggers
#   on MASSIVE-DAILY workflow_run success (always after prices_eod is in),
#   plus a late-night safety-net cron at 02:00 ET if workflow_run misses.
#
# Required GitHub secrets:
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY

on:
  workflow_run:
    workflows: ["MASSIVE-DAILY"]
    types: [completed]
  schedule:
    - cron: '0 6 * * 2-6'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build + score + log only, do not write (true/false)"
        required: false
        default: 'false'

concurrency:
  group: screener-trading-opps-daily
  cancel-in-progress: false

jobs:
  produce:
    if: >-
      github.event_name == 'workflow_dispatch'
      || github.event_name == 'schedule'
      || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: trading-scanner
        run: |
          pip install --upgrade pip
          pip install pandas numpy requests

      - name: Restore cached price history
        uses: actions/cache/restore@v4
        with:
          path: trading-scanner/scanner/trading_opps/data
          key: prices-eod-cache-${{ github.run_id }}
          restore-keys: |
            prices-eod-cache-

      - name: Run the nightly screener
        working-directory: trading-scanner
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          PYTHONPATH=. python3 -m scanner.trading_opps.run_screener $ARGS

      - name: Save cached price history
        if: always()
        uses: actions/cache/save@v4
        with:
          path: trading-scanner/scanner/trading_opps/data
          key: prices-eod-cache-${{ github.run_id }}

      - name: Surface latest snapshot row count
        if: ${{ inputs.dry_run != 'true' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -s -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
                  -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
                  -H "Prefer: count=exact" \
                  "$SUPABASE_URL/rest/v1/trading_opps_signals?select=ticker&limit=1" \
                  -I 2>&1 | grep -i content-range || true
