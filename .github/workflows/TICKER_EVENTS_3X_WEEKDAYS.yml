name: TICKER_EVENTS_3X_WEEKDAYS

# Fires 3x/weekday at 10:05, 13:05, and 15:50 America/New_York. Pulls
# news / insider / congress / darkpool events from UW firehose endpoints
# and upserts to public.ticker_events.
#
# Offset 5 minutes after UNIVERSE_SNAPSHOT_3X_WEEKDAYS intentionally —
# ticker_events filters by universe_snapshots, so we want the universe
# row to land first. 5 min is plenty of headroom for the snapshot job
# (typically 10-15 sec).
#
# Required GitHub secrets:
#   UNUSUAL_WHALES_API_KEY
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#
# DST handling: six cron entries (three slots × two DST offsets). The
# gate step skips any run that isn't the expected America/New_York
# local time.

on:
  schedule:
    # Three primary slots + a +60-min backup for each so a dropped or
    # late GitHub fire is recovered the same hour. Idempotency check
    # below means a backup fire after a successful primary is a no-op.
    - cron: '5 14 * * 1-5'    # 10:05 EDT
    - cron: '5 15 * * 1-5'    # 10:05 EST + 11:05 EDT backup
    - cron: '5 16 * * 1-5'    # 11:05 EST backup
    - cron: '5 17 * * 1-5'    # 13:05 EDT
    - cron: '5 18 * * 1-5'    # 13:05 EST + 14:05 EDT backup
    - cron: '5 19 * * 1-5'    # 14:05 EST backup
    - cron: '50 19 * * 1-5'   # 15:50 EDT
    - cron: '50 20 * * 1-5'   # 15:50 EST + 16:50 EDT backup
    - cron: '50 21 * * 1-5'   # 16:50 EST backup
  workflow_dispatch:

concurrency:
  group: ticker-events-3x-weekdays
  cancel-in-progress: false

jobs:
  events:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Idempotency gate — skip if a ticker_events row was written in the last 50 min
        # Replaces the strict 15-min slot gate. New rule: if Supabase shows
        # a successful write to ticker_events in the last 50 min, skip
        # (no-op). Otherwise proceed. Absorbs GitHub Actions cron drift
        # (which dropped today's 10:00 + 13:00 ET fires entirely on Wed
        # May 6 2026), and makes the +60-min backup cron entries safe —
        # they only do work when the primary fire failed or hasn't happened.
        # workflow_dispatch always proceeds (manual recovery dispatch).
        if: github.event_name == 'schedule'
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          LATEST=$(curl -fsS --max-time 8 \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            "$SUPABASE_URL/rest/v1/ticker_events?select=event_ts&order=event_ts.desc&limit=1" \
            | python3 -c "import sys,json; r=json.load(sys.stdin); print(r[0]['event_ts'] if r else '')")
          if [ -z "$LATEST" ]; then
            echo "::notice::No prior ticker_events row — proceeding (cold start)."
            exit 0
          fi
          NOW_EPOCH=$(date -u +%s)
          LATEST_EPOCH=$(python3 -c "import datetime,sys; s='$LATEST'.replace('Z','+00:00'); print(int(datetime.datetime.fromisoformat(s).timestamp()))")
          AGE_MIN=$(( (NOW_EPOCH - LATEST_EPOCH) / 60 ))
          echo "Latest ticker_events row: $LATEST  ·  age: ${AGE_MIN} min"
          if [ "$AGE_MIN" -lt 50 ]; then
            echo "::notice::Idempotent skip — last write was ${AGE_MIN} min ago (< 50)."
            echo "SKIP_RUN=true" >> "$GITHUB_ENV"
          else
            echo "✓ Last write was ${AGE_MIN} min ago — proceeding."
          fi
      - name: Checkout repository
        if: env.SKIP_RUN != 'true'
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        if: env.SKIP_RUN != 'true'
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: trading-scanner/requirements.txt

      - name: Install scanner dependencies
        if: env.SKIP_RUN != 'true'
        working-directory: trading-scanner
        run: pip install -r requirements.txt

      - name: Run ticker_events ingestion
        if: env.SKIP_RUN != 'true'
        working-directory: trading-scanner
        env:
          UNUSUAL_WHALES_API_KEY: ${{ secrets.UNUSUAL_WHALES_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python run_ticker_events.py
