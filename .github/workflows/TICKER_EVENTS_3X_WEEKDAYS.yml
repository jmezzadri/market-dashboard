name: TICKER_EVENTS_3X_WEEKDAYS

# Fires 3x/weekday at 10:05, 13:05, and 15:50 America/New_York. Pulls
# news / insider / congress / darkpool events from UW firehose endpoints
# and upserts to public.ticker_events.
#
# Offset 5 minutes after UNIVERSE_SNAPSHOT_3X_WEEKDAYS intentionally —
# ticker_events filters by universe_snapshots, so we want the universe
# row to land first. 5 min is plenty of headroom for the snapshot job
# (typically 10-15 sec).
#
# Required GitHub secrets:
#   UNUSUAL_WHALES_API_KEY
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#
# DST handling: six cron entries (three slots × two DST offsets). The
# gate step skips any run that isn't the expected America/New_York
# local time.

on:
  schedule:
    # 10:05 America/New_York
    - cron: '5 14 * * 1-5'    # 10:05 EDT (UTC-4)
    - cron: '5 15 * * 1-5'    # 10:05 EST (UTC-5)
    # 13:05 America/New_York
    - cron: '5 17 * * 1-5'    # 13:05 EDT
    - cron: '5 18 * * 1-5'    # 13:05 EST
    # 15:50 America/New_York
    - cron: '50 19 * * 1-5'   # 15:50 EDT
    - cron: '50 20 * * 1-5'   # 15:50 EST
  workflow_dispatch:

concurrency:
  group: ticker-events-3x-weekdays
  cancel-in-progress: false

jobs:
  events:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: DST gate — fire inside a 15-min window after each NY slot
        # Only gate scheduled runs; workflow_dispatch always proceeds.
        #
        # Bug #1033/#1032: relaxed from strict minute-exact equality on the
        # NY-local clock to a 15-minute window starting at each target slot.
        # Bug #1131 (2026-04-29): GitHub Actions cron drift on Tuesday
        # 2026-04-28 ranged from 38 minutes to 3+ hours past the scheduled
        # slot (typical drift under load), causing every run to land
        # outside the 15-minute window and the gate to silently skip the
        # ingestion step. Widened the window to 50 minutes — still 10
        # minutes shy of the 60-minute UTC gap between EDT and EST sister
        # cron entries, so no double-firing possible.
        if: github.event_name == 'schedule'
        run: |
          NY_HM=$(TZ=America/New_York date +%H:%M)
          NY_H=${NY_HM%:*}
          NY_M=${NY_HM#*:}
          # Strip any leading zero for bash arithmetic.
          NY_H=${NY_H#0}; NY_M=${NY_M#0}
          MINS=$(( NY_H * 60 + NY_M ))
          HIT=""
          for SLOT in 10:05 13:05 15:50; do
            SH=${SLOT%:*}; SM=${SLOT#*:}
            SH=${SH#0}; SM=${SM#0}
            SLOT_START=$(( SH * 60 + SM ))
            SLOT_END=$(( SLOT_START + 49 ))
            if [ "$MINS" -ge "$SLOT_START" ] && [ "$MINS" -le "$SLOT_END" ]; then
              HIT="$SLOT"
              break
            fi
          done
          if [ -z "$HIT" ]; then
            echo "::notice::Skipping — NYC local is $NY_HM, outside slot windows. DST-matched cron will handle today."
            echo "SKIP_RUN=true" >> "$GITHUB_ENV"
          else
            echo "✓ NYC time is $NY_HM, inside 15-min window for slot $HIT — proceeding."
          fi

      - name: Checkout repository
        if: env.SKIP_RUN != 'true'
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        if: env.SKIP_RUN != 'true'
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: trading-scanner/requirements.txt

      - name: Install scanner dependencies
        if: env.SKIP_RUN != 'true'
        working-directory: trading-scanner
        run: pip install -r requirements.txt

      - name: Run ticker_events ingestion
        if: env.SKIP_RUN != 'true'
        working-directory: trading-scanner
        env:
          UNUSUAL_WHALES_API_KEY: ${{ secrets.UNUSUAL_WHALES_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python run_ticker_events.py
