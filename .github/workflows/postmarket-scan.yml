# Retired — replaced by daily-scan.yml (runs at 3:45 PM EDT).
# Kept for manual dispatch only; no scheduled trigger.
name: Post-Market Scan (Retired)

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run post-market scan
        env:
          UNUSUAL_WHALES_API_KEY: ${{ secrets.UNUSUAL_WHALES_API_KEY }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SCORE_BUY_ALERT: "60"
          SCORE_WATCH_ALERT: "35"
          ALERT_ON_WATCH: "true"
          ALERT_ON_BUY: "true"
        run: python main.py postmarket

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postmarket-report-${{ github.run_id }}
          path: reports/
          retention-days: 30

      - name: Save scan state
        run: |
          git config user.name "Trading Scanner"
          git config user.email "scanner@github-actions"
          git add portfolio/.last_scan_scores.json
          git add reports/latest_report.html
          git add reports/latest_scan_data.json
          git diff --staged --quiet || git commit -m "Update scan state [skip ci]"
          git pull --rebase origin main
          git push

      - name: Push scan data to market-dashboard (public)
        env:
          DASHBOARD_PAT: ${{ secrets.DASHBOARD_PAT }}
        run: |
          git clone https://jmezzadri:$DASHBOARD_PAT@github.com/jmezzadri/market-dashboard.git /tmp/market-dashboard
          cp reports/latest_scan_data.json /tmp/market-dashboard/public/latest_scan_data.json
          cd /tmp/market-dashboard
          git config user.name "Trading Scanner"
          git config user.email "scanner@github-actions"
          git add public/latest_scan_data.json
          git diff --staged --quiet || git commit -m "Scan data update [skip ci]"
          git push
