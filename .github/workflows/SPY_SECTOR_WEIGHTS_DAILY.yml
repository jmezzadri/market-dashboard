name: SPY_SECTOR_WEIGHTS_DAILY

# Pipeline: market-spy_sector_weights-daily
#
# Pulls the State Street SPDR SPY holdings file once per weekday at 06:00
# America/New_York, aggregates weight by GICS sector, and upserts to
# public.spy_sector_weights. Bug #1087 Phase 1.
#
# Required GitHub secrets:
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#
# DST handling: two cron entries (one for EDT, one for EST). The gate step
# skips any run that isn't 06:00 America/New_York.

on:
  schedule:
    # 06:00 America/New_York
    - cron: '0 10 * * 1-5'    # 06:00 EDT (UTC-4)
    - cron: '0 11 * * 1-5'    # 06:00 EST (UTC-5)
  workflow_dispatch:

concurrency:
  group: spy-sector-weights-daily
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: DST gate — skip if not 06:00 America/New_York
        if: github.event_name == 'schedule'
        run: |
          NY_HM=$(TZ=America/New_York date +%H:%M)
          echo "America/New_York time: $NY_HM"
          if [ "$NY_HM" != "06:00" ]; then
            echo "::notice::Skipping — NYC local is $NY_HM, not 06:00. The DST-matched cron will handle today."
            echo "SKIP_RUN=true" >> "$GITHUB_ENV"
          else
            echo "✓ NYC time is 06:00 — proceeding with ingest."
          fi

      - name: Checkout repository
        if: env.SKIP_RUN != 'true'
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        if: env.SKIP_RUN != 'true'
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: trading-scanner/requirements.txt

      - name: Install scanner dependencies
        if: env.SKIP_RUN != 'true'
        working-directory: trading-scanner
        run: pip install -r requirements.txt

      - name: Run SPY sector weights ingest
        if: env.SKIP_RUN != 'true'
        working-directory: trading-scanner
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python ingest_spy_sector_weights.py
