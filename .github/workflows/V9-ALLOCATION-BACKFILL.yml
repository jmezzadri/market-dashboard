name: V9 Allocation Backfill (one-shot)

# One-shot workflow: replays compute_v9_allocation.py for every Saturday
# from 2026-01-03 through today, populating public/allocation_history.json
# with weekly snapshots so the AA tab's "Last Month / Last Quarter" columns
# and "Allocation Changes" / "Rating Changes" tables have real data.
#
# This is a manual workflow_dispatch — run it once after merging the
# backfill PR. After it commits the populated allocation_history.json,
# this workflow file can be deleted (the V9-ALLOCATION-WEEKLY workflow
# takes over from there for ongoing snapshots).
#
# Closes #1082.

on:
  workflow_dispatch:
    inputs:
      commit_results:
        description: "Commit the populated allocation_history.json to the branch?"
        required: false
        default: "true"

concurrency:
  group: v9-allocation-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - name: Check out market-dashboard
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        if: ${{ inputs.commit_results == 'true' }}
        run: |
          git config user.name  "Market Dashboard Bot"
          git config user.email "bot@github-actions"

      - name: Run backfill replay
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python backfill_allocation_history.py 2>&1 | tee backfill.log

      - name: Show resulting snapshot count
        run: |
          if [ -f public/allocation_history.json ]; then
            python <<'PYDIAG'
          import json
          h = json.load(open("public/allocation_history.json"))
          print(f"snapshots: {len(h)}")
          for s in h:
              print(f"  {s.get('as_of')} {s.get('stance_label')} alpha={s.get('alpha')}")
          PYDIAG
          else
            echo "WARN: public/allocation_history.json not found"
          fi

      - name: Commit + push if changed
        if: ${{ inputs.commit_results == 'true' }}
        run: |
          git add public/allocation_history.json backfill.log
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git commit -m "feat(quant): backfill allocation_history.json with weekly snapshots [skip ci]

          Replays compute_v9_allocation.py for every Saturday from 2026-01-03
          through latest. Generated by .github/workflows/V9-ALLOCATION-BACKFILL.yml.

          Closes #1082."
          git push origin HEAD:${GITHUB_REF#refs/heads/}

      - name: Upload backfill log
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: v9-allocation-backfill-${{ github.run_id }}
          path: |
            public/allocation_history.json
            backfill.log
          retention-days: 30
          if-no-files-found: ignore
