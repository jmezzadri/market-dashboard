# PIPELINE-FRESHNESS-WATCHDOG — every-30-min freshness sweep.
#
# Why
# ───
# GitHub Actions cron is unreliable. Two consecutive incidents in May 2026:
# Mon-Tue MASSIVE-DAILY missed two scheduled fires; Wed UNIVERSE_SNAPSHOT_3X
# and TICKER_EVENTS_3X had ZERO scheduled fires for the entire day. Backup
# cron entries help when SOME fires land, but if GH drops them all, no
# amount of YAML cron redundancy saves us. This workflow is the durable
# answer: it runs every 30 min during market hours, queries the actual
# data tables in Supabase, and re-dispatches the per-pipeline workflow
# whenever freshness exceeds the SLA. Each dispatched workflow has its
# own idempotency-by-data gate, so a duplicate dispatch is a no-op.
#
# How
# ───
# For each watched pipeline:
#   1. Query Supabase for the most recent row (max(ts)).
#   2. Compute age in minutes.
#   3. If age > SLA AND we are inside the pipeline's valid-run window
#      (e.g. don't fire MASSIVE-DAILY at 9 AM ET) → dispatch via gh CLI.
#   4. Otherwise log "fresh, no action" and move on.
#
# This workflow itself uses 4 cron entries (every 30 min, market-hours
# wide window) so even if GitHub drops some watchdog fires, the rest
# catch the staleness.
#
# Permissions: actions:write so `gh workflow run` can dispatch siblings.

name: PIPELINE-FRESHNESS-WATCHDOG

on:
  schedule:
    # Every 10 min during the US trading day, weekdays. GitHub Actions cron
    # is unreliable enough that 30-min cadence dropped ALL of today's
    # market-hours fires (May 7 2026 incident — zero watchdog fires
    # between 09:46 UTC and 18:00 UTC despite 16 expected). 10-min cadence
    # ≈ 60 fires per market-hours window; even if GH drops 80% of them
    # the watchdog still gets enough samples to keep data inside its SLA.
    # Joe directive 2026-05-07.
    - cron: '*/10 14-23 * * 1-5'   # 14:00 UTC = 10:00 ET (EDT) — every 10 min, 10 AM to 7 PM ET
    - cron: '*/10 0-3 * * 2-6'     # next-day 00:00-03:50 UTC = 8 PM-11:50 PM ET prior day
  workflow_dispatch: {}

concurrency:
  group: pipeline-freshness-watchdog
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
      contents: read
    env:
      GH_TOKEN:                  ${{ secrets.GITHUB_TOKEN }}
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Sweep — query freshness, dispatch stale pipelines
        run: |
          python3 - <<'PY'
          import os, json, urllib.request, datetime, subprocess, sys

          SUPA_URL = os.environ["SUPABASE_URL"]
          SUPA_KEY = os.environ["SUPABASE_SERVICE_ROLE_KEY"]

          # ─── Watchlist config ────────────────────────────────────────────
          # Each entry says where to read freshness from, what the SLA is,
          # and which workflow to dispatch when stale. Time windows are in
          # ET (NYSE local) — outside the window we skip dispatch even if
          # stale (e.g. don't fire MASSIVE-DAILY at 9 AM ET; it expects
          # post-close data and the upstream Polygon publish hasn't
          # happened yet anyway).
          PIPELINES = [
              {
                  "name":     "universe_snapshots",
                  "table":    "universe_snapshots",
                  "ts_col":   "snapshot_ts",
                  "sla_min":  90,
                  "workflow": "UNIVERSE_SNAPSHOT_3X_WEEKDAYS.yml",
                  "et_window": (10, 17),   # 10 AM-5 PM ET
              },
              {
                  "name":     "ticker_events",
                  "table":    "ticker_events",
                  "ts_col":   "event_ts",
                  "sla_min":  90,
                  "workflow": "TICKER_EVENTS_3X_WEEKDAYS.yml",
                  "et_window": (10, 17),
              },
              {
                  "name":     "massive-eod",
                  "table":    "prices_eod",
                  "ts_col":   "ingested_at",
                  "sla_min":  24 * 60,     # 24h — daily
                  "workflow": "MASSIVE-DAILY.yml",
                  "et_window": (18, 23),    # only attempt 6 PM-11 PM ET
              },
          ]

          # ─── Helpers ────────────────────────────────────────────────────
          def supa_get(path):
              req = urllib.request.Request(
                  f"{SUPA_URL}{path}",
                  headers={"apikey": SUPA_KEY, "Authorization": f"Bearer {SUPA_KEY}"},
              )
              with urllib.request.urlopen(req, timeout=10) as r:
                  return json.loads(r.read().decode())

          def latest_ts(table, ts_col):
              rows = supa_get(f"/rest/v1/{table}?select={ts_col}&order={ts_col}.desc&limit=1")
              if not rows: return None
              return rows[0][ts_col]

          def age_minutes(iso_ts):
              if not iso_ts: return None
              s = iso_ts.replace("Z", "+00:00")
              dt = datetime.datetime.fromisoformat(s)
              now = datetime.datetime.now(datetime.timezone.utc)
              return int((now - dt).total_seconds() / 60)

          def et_hour_now():
              # Compute current hour in America/New_York. Python 3.9+ zoneinfo.
              from zoneinfo import ZoneInfo
              return datetime.datetime.now(ZoneInfo("America/New_York")).hour

          def dispatch(workflow_file):
              # Use gh CLI which uses GITHUB_TOKEN with actions:write.
              repo = os.environ.get("GITHUB_REPOSITORY", "jmezzadri/market-dashboard")
              cmd = ["gh", "workflow", "run", workflow_file, "--ref", "main", "--repo", repo]
              r = subprocess.run(cmd, capture_output=True, text=True)
              return r.returncode == 0, (r.stdout + r.stderr).strip()

          # ─── Sweep ──────────────────────────────────────────────────────
          et_h = et_hour_now()
          print(f"=== Watchdog sweep — current hour ET = {et_h} ===\n")

          any_dispatched = False
          for p in PIPELINES:
              try:
                  ts = latest_ts(p["table"], p["ts_col"])
              except Exception as e:
                  print(f"[{p['name']}] ERROR querying Supabase: {e}")
                  continue

              age = age_minutes(ts)
              window_lo, window_hi = p["et_window"]
              in_window = window_lo <= et_h <= window_hi

              status = f"latest={ts}  age={age}min  sla={p['sla_min']}min  window=ET {window_lo}-{window_hi}"

              if age is None:
                  print(f"[{p['name']}] NO ROWS — skipping ({status})")
                  continue

              if age <= p["sla_min"]:
                  print(f"[{p['name']}] FRESH — no action ({status})")
                  continue

              if not in_window:
                  print(f"[{p['name']}] STALE but outside window — no dispatch ({status})")
                  continue

              ok, msg = dispatch(p["workflow"])
              if ok:
                  print(f"[{p['name']}] STALE → DISPATCHED {p['workflow']}  ({status})")
                  any_dispatched = True
              else:
                  print(f"[{p['name']}] STALE → DISPATCH FAILED: {msg}  ({status})")
                  # Don't fail the workflow on a single dispatch failure;
                  # next sweep will retry.

          if any_dispatched:
              print("\nSummary: dispatched at least one stale pipeline.")
          else:
              print("\nSummary: nothing to do, all watched pipelines fresh.")

          # ─── Recurrence-recommend layer ───────────────────────────────
          # When MASSIVE-DAILY shows a pattern of repeat staleness inside
          # the last 7 days, surface a one-line recommendation in the
          # watchdog log. This is the "stay on free until pattern recurs,
          # then re-recommend" handshake Joe approved 2026-05-09 — we do
          # NOT auto-upgrade the Polygon plan; we just print so the next
          # human review of the watchdog sees the signal.
          #
          # Trigger: 2+ "stale" events in last 7 days, where "stale" means
          # EITHER the GitHub workflow_runs API reports a failed/cancelled
          # MASSIVE-DAILY run, OR the pipeline_fetch_log table records the
          # massive-eod indicator at status='stale' (the last_check_at row
          # written by a prior watchdog sweep that flagged staleness).
          # Either signal counts toward the 2-event threshold (OR-merge).

          def count_recent_workflow_failures(workflow_file, days=7):
              repo = os.environ.get("GITHUB_REPOSITORY", "jmezzadri/market-dashboard")
              since = (datetime.datetime.now(datetime.timezone.utc)
                       - datetime.timedelta(days=days)).strftime("%Y-%m-%dT%H:%M:%SZ")
              api = (f"https://api.github.com/repos/{repo}/actions/workflows/"
                     f"{workflow_file}/runs?per_page=50&created=>{since}")
              token = os.environ.get("GH_TOKEN", "")
              req = urllib.request.Request(api, headers={
                  "Accept":        "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
              })
              try:
                  with urllib.request.urlopen(req, timeout=10) as r:
                      payload = json.loads(r.read().decode())
              except Exception as e:
                  print(f"[recurrence-check] could not read workflow_runs: {e}")
                  return 0
              bad = {"failure", "timed_out", "cancelled", "startup_failure"}
              n = sum(1 for run in payload.get("workflow_runs", [])
                      if (run.get("conclusion") or "").lower() in bad)
              return n

          def count_recent_stale_flags(indicator_id, days=7):
              # pipeline_fetch_log carries one row per watchdog (or producer)
              # check, with status in {ok, stale, error, ...}. Past sweeps
              # that called the pipeline stale leave a row here.
              since = (datetime.datetime.now(datetime.timezone.utc)
                       - datetime.timedelta(days=days)).isoformat()
              path = (f"/rest/v1/pipeline_fetch_log?select=status,check_at"
                      f"&indicator_id=eq.{indicator_id}"
                      f"&status=in.(stale,error)"
                      f"&check_at=gte.{since}")
              try:
                  rows = supa_get(path)
              except Exception as e:
                  print(f"[recurrence-check] could not read pipeline_fetch_log: {e}")
                  return 0
              return len(rows or [])

          fail_n  = count_recent_workflow_failures("MASSIVE-DAILY.yml", days=7)
          stale_n = count_recent_stale_flags("massive-eod", days=7)
          recur_total = fail_n + stale_n
          print(f"\n[recurrence-check] MASSIVE-DAILY in last 7d — "
                f"workflow_failures={fail_n}, stale_log_rows={stale_n}, "
                f"combined={recur_total}")

          if recur_total >= 2:
              print("RECOMMENDATION: pattern of repeat failures detected, "
                    "consider Polygon Starter tier upgrade ($29/mo, $348/yr)")

          PY
