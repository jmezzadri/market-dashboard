name: UNIVERSE_SNAPSHOT_3X_WEEKDAYS

# Fires 3x/weekday at 10:00, 13:00, and 15:45 America/New_York. Pulls the
# full US equity universe (>= $1B mcap; Common Stock + ADR + ETF) from
# UW /api/screener/stocks with marketcap band-slicing + a supplemental
# direct-ticker fetch for flagships the ordered screener drops (e.g. SPY).
# Writes snapshot rows to public.universe_snapshots in Supabase.
#
# This is ADDITIVE to SCAN_345PM_WEEKDAYS — that scan owns per-ticker
# options flow, dark pool, congress trades, technicals on the watchlist
# union. This job owns broad-universe price + options snapshot.
#
# Required GitHub secrets:
#   UNUSUAL_WHALES_API_KEY
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#
# DST handling: six cron entries (three slots × two DST offsets). The
# gate step skips any run that isn't the expected America/New_York
# local time. The other DST cron for that slot handles the real fire.

on:
  schedule:
    # 10:00 America/New_York
    - cron: '0 14 * * 1-5'    # 10:00 EDT (UTC-4)
    - cron: '0 15 * * 1-5'    # 10:00 EST (UTC-5)
    # 13:00 America/New_York
    - cron: '0 17 * * 1-5'    # 13:00 EDT
    - cron: '0 18 * * 1-5'    # 13:00 EST
    # 15:45 America/New_York — 15 min before the existing SCAN_345PM run
    - cron: '45 19 * * 1-5'   # 15:45 EDT
    - cron: '45 20 * * 1-5'   # 15:45 EST
  workflow_dispatch:

concurrency:
  group: universe-snapshot-3x-weekdays
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: DST gate — fire inside a 15-min window after each NY slot
        # Only gate scheduled runs; workflow_dispatch always proceeds.
        #
        # Bug #1033/#1032: relaxed from strict minute-exact equality on the
        # NY-local clock to a 15-minute window starting at each target slot.
        # GitHub's cron scheduler routinely slips a few minutes, and strict
        # equality was silently dropping every scheduled run (e.g.
        # ticker_events last logged to api_usage_log on 2026-04-22 for this
        # reason). The sister DST cron entries fall well outside these
        # windows by construction, so no double-firing.
        if: github.event_name == 'schedule'
        run: |
          NY_HM=$(TZ=America/New_York date +%H:%M)
          NY_H=${NY_HM%:*}
          NY_M=${NY_HM#*:}
          NY_H=${NY_H#0}; NY_M=${NY_M#0}
          MINS=$(( NY_H * 60 + NY_M ))
          HIT=""
          for SLOT in 10:00 13:00 15:45; do
            SH=${SLOT%:*}; SM=${SLOT#*:}
            SH=${SH#0}; SM=${SM#0}
            SLOT_START=$(( SH * 60 + SM ))
            SLOT_END=$(( SLOT_START + 49 ))   # widened from 15min to 50min — see PR #284 + LESSONS rule #32 for cron-drift context
            if [ "$MINS" -ge "$SLOT_START" ] && [ "$MINS" -le "$SLOT_END" ]; then
              HIT="$SLOT"
              break
            fi
          done
          if [ -z "$HIT" ]; then
            echo "::notice::Skipping — NYC local is $NY_HM, outside slot windows. DST-matched cron will handle today."
            echo "SKIP_RUN=true" >> "$GITHUB_ENV"
          else
            echo "✓ NYC time is $NY_HM, inside 15-min window for slot $HIT — proceeding."
          fi

      - name: Checkout repository
        if: env.SKIP_RUN != 'true'
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        if: env.SKIP_RUN != 'true'
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: trading-scanner/requirements.txt

      - name: Install scanner dependencies
        if: env.SKIP_RUN != 'true'
        working-directory: trading-scanner
        run: pip install -r requirements.txt

      - name: Run universe snapshot
        if: env.SKIP_RUN != 'true'
        working-directory: trading-scanner
        env:
          UNUSUAL_WHALES_API_KEY: ${{ secrets.UNUSUAL_WHALES_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python run_universe_snapshot.py
