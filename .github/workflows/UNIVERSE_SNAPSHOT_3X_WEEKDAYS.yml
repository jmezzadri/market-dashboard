name: UNIVERSE_SNAPSHOT_3X_WEEKDAYS

# Fires 3x/weekday at 10:00, 13:00, and 15:45 America/New_York. Pulls the
# full US equity universe (>= $1B mcap; Common Stock + ADR + ETF) from
# UW /api/screener/stocks with marketcap band-slicing + a supplemental
# direct-ticker fetch for flagships the ordered screener drops (e.g. SPY).
# Writes snapshot rows to public.universe_snapshots in Supabase.
#
# This is ADDITIVE to SCAN_345PM_WEEKDAYS — that scan owns per-ticker
# options flow, dark pool, congress trades, technicals on the watchlist
# union. This job owns broad-universe price + options snapshot.
#
# Required GitHub secrets:
#   UNUSUAL_WHALES_API_KEY
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#
# DST handling: six cron entries (three slots × two DST offsets). The
# gate step skips any run that isn't the expected America/New_York
# local time. The other DST cron for that slot handles the real fire.

on:
  schedule:
    # Three primary slots + a +60-min backup for each so a dropped or
    # late GitHub fire is recovered the same hour. Idempotency check
    # below means a backup fire after a successful primary is a no-op.
    - cron: '0 14 * * 1-5'    # 10:00 EDT
    - cron: '0 15 * * 1-5'    # 10:00 EST + 11:00 EDT backup
    - cron: '0 16 * * 1-5'    # 11:00 EST backup
    - cron: '0 17 * * 1-5'    # 13:00 EDT
    - cron: '0 18 * * 1-5'    # 13:00 EST + 14:00 EDT backup
    - cron: '0 19 * * 1-5'    # 14:00 EST backup
    - cron: '45 19 * * 1-5'   # 15:45 EDT
    - cron: '45 20 * * 1-5'   # 15:45 EST + 16:45 EDT backup
    - cron: '45 21 * * 1-5'   # 16:45 EST backup
  workflow_dispatch:

concurrency:
  group: universe-snapshot-3x-weekdays
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Idempotency gate — skip if a universe_snapshots row was written in the last 50 min
        # Replaces the strict 15-min slot gate. New rule: if Supabase shows
        # a successful write to universe_snapshots in the last 50 min, skip
        # (no-op). Otherwise proceed. Absorbs GitHub Actions cron drift
        # (which dropped today's 10:00 + 13:00 ET fires entirely on Wed
        # May 6 2026), and makes the +60-min backup cron entries safe —
        # they only do work when the primary fire failed or hasn't happened.
        # workflow_dispatch always proceeds (manual recovery dispatch).
        if: github.event_name == 'schedule'
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          LATEST=$(curl -fsS --max-time 8 \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            "$SUPABASE_URL/rest/v1/universe_snapshots?select=snapshot_ts&order=snapshot_ts.desc&limit=1" \
            | python3 -c "import sys,json; r=json.load(sys.stdin); print(r[0]['snapshot_ts'] if r else '')")
          if [ -z "$LATEST" ]; then
            echo "::notice::No prior universe_snapshots row — proceeding (cold start)."
            exit 0
          fi
          NOW_EPOCH=$(date -u +%s)
          LATEST_EPOCH=$(python3 -c "import datetime,sys; s='$LATEST'.replace('Z','+00:00'); print(int(datetime.datetime.fromisoformat(s).timestamp()))")
          AGE_MIN=$(( (NOW_EPOCH - LATEST_EPOCH) / 60 ))
          echo "Latest universe_snapshots row: $LATEST  ·  age: ${AGE_MIN} min"
          if [ "$AGE_MIN" -lt 50 ]; then
            echo "::notice::Idempotent skip — last write was ${AGE_MIN} min ago (< 50)."
            echo "SKIP_RUN=true" >> "$GITHUB_ENV"
          else
            echo "✓ Last write was ${AGE_MIN} min ago — proceeding."
          fi
      - name: Checkout repository
        if: env.SKIP_RUN != 'true'
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        if: env.SKIP_RUN != 'true'
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: trading-scanner/requirements.txt

      - name: Install scanner dependencies
        if: env.SKIP_RUN != 'true'
        working-directory: trading-scanner
        run: pip install -r requirements.txt

      - name: Run universe snapshot
        if: env.SKIP_RUN != 'true'
        working-directory: trading-scanner
        env:
          UNUSUAL_WHALES_API_KEY: ${{ secrets.UNUSUAL_WHALES_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python run_universe_snapshot.py
