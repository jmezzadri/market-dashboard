name: EARNINGS-HISTORY-WEEKLY

# Refresh public.earnings_history every Sunday so the modal Earnings &
# Events tile renders the latest beats/misses strip on Monday morning.
# Bug #1134 item 5 ingest pipeline.

on:
  workflow_dispatch:
  schedule:
    # Sunday 11:00 UTC ≈ 7am ET — well clear of Monday market open.
    - cron: "0 11 * * 0"

jobs:
  refresh:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    defaults:
      run:
        working-directory: trading-scanner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: trading-scanner/requirements.txt
      - run: pip install -r requirements.txt
      - name: Refresh earnings_history
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m run_earnings_history
