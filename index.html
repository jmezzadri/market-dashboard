<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/macrotilt-icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0b0d10" />
    <title>MacroTilt — Market Dashboard</title>
      <script>
      /* Phase 2 preview flag — ?theme=phase2 on any URL activates the
         parchment/ink re-skin. Lives on main behind this gate so the
         default visual is unchanged until Joe flips the default in Step 4b. */
      (function () {
        try {
          var p = new URLSearchParams(window.location.search);
          if (p.get("theme") === "phase2") {
            document.documentElement.setAttribute("data-mt-theme", "dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
